# ─────────────────────────────────────────────────────────────────────────────
# Test profile — used by Testcontainers integration tests
# Datasource is auto-configured by @ServiceConnection in test class
# ─────────────────────────────────────────────────────────────────────────────

spring:
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.notificationservice: INFO
    org.flywaydb: INFO

app:
  jwt:
    secret: "test-jwt-secret-for-integration-tests-only-32chars"
    expiration-ms: 3600000   # 1 hour for tests
