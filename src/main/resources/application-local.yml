# ─────────────────────────────────────────────────────────────────────────────
# Local development profile — overrides application.yml
# Activate with: SPRING_PROFILES_ACTIVE=local
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: notif_user
    password: notif_pass
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: NotifHikariPool-local

  jpa:
    properties:
      hibernate:
        format_sql: true    # Pretty-print SQL in dev
    show-sql: true

logging:
  level:
    root: INFO
    com.notificationservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

management:
  endpoint:
    health:
      show-details: always
