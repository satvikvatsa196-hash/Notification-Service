# ─────────────────────────────────────────────────────────────────────────────
# Base Application Configuration
# Shared across all profiles; overridden by profile-specific files
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: notification-service

  # ── Jackson ─────────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    open-in-view: false         # Prevent lazy-load issues in controllers
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, flyway, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  info:
    env:
      enabled: true

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never       # Never leak stack traces to clients
    include-stacktrace: never

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ── Application custom properties ─────────────────────────────────────────────
app:
  api:
    version: "v1"
    prefix: "/api/v1"
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:4200"
  jwt:
    # SECURITY: Override this in production with a strong random secret (>=32 chars)
    # e.g. via environment variable: APP_JWT_SECRET=<your-secret>
    secret: "${APP_JWT_SECRET:notification-service-jwt-secret-change-in-production}"
    # Token validity in milliseconds (default: 24 hours)
    expiration-ms: "${APP_JWT_EXPIRATION_MS:86400000}"
